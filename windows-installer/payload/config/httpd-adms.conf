# =============================================================================
# ADMS virtual host + PHP wiring - included from the bundled Apache httpd.conf.
# first-run-setup.bat substitutes __ADMS_PORT__ and __ADMS_ROOT__ (forward
# slashes) and writes the result as httpd-adms.active.conf, which the main
# httpd.conf Includes.  This file is self-contained for PHP so the only edits
# needed in the stock Apache config are SRVROOT + mod_rewrite (done by setup).
# =============================================================================

# --- PHP (Thread-Safe build, run as an Apache module) ------------------------
LoadModule php_module "__ADMS_ROOT__/runtime/php/php8apache2_4.dll"
AddHandler application/x-httpd-php .php
PHPIniDir "__ADMS_ROOT__/runtime/php"

# --- Listener + site ---------------------------------------------------------
Listen __ADMS_PORT__

<VirtualHost *:__ADMS_PORT__>
    DocumentRoot "__ADMS_ROOT__/app/public"
    ServerName localhost
    DirectoryIndex index.php index.html

    <Directory "__ADMS_ROOT__/app/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  "__ADMS_ROOT__/logs/apache-error.log"
    CustomLog "__ADMS_ROOT__/logs/apache-access.log" common
</VirtualHost>
