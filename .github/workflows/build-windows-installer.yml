name: Build Windows Installer

# Builds ADMS-Server-Setup.exe entirely in CI (no local machine needed).
#  - Ubuntu job: runs windows-installer/prepare-payload.sh -> build/app
#  - Windows job: bundles portable PHP + Apache, compiles the Inno Setup script
# Trigger it from the Actions tab (Run workflow), or push a tag like v1.0.0 to
# also publish the .exe as a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      php_minor:
        description: "PHP minor series (must exist in php.net releases.json)"
        default: "8.3"
        required: true
      apache_url:
        description: "Optional Apache Lounge VS17 zip URL (blank = auto-detect latest)"
        default: ""
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the clean Laravel payload (build/app) on Linux.
  # ---------------------------------------------------------------------------
  payload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php_minor || '8.3' }}
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, fileinfo, openssl
          tools: composer

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build payload
        run: |
          chmod +x windows-installer/prepare-payload.sh
          ./windows-installer/prepare-payload.sh

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-payload
          path: windows-installer/build/app
          include-hidden-files: true
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. Assemble the portable runtime + compile the installer on Windows.
  # ---------------------------------------------------------------------------
  installer:
    needs: payload
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Download payload artifact
        uses: actions/download-artifact@v4
        with:
          name: app-payload
          path: windows-installer/build/app

      - name: Fetch portable PHP (Thread Safe, x64)
        run: |
          $minor = "${{ github.event.inputs.php_minor || '8.3' }}"
          $releases = Invoke-RestMethod "https://windows.php.net/downloads/releases/releases.json"
          $entry = $releases.$minor
          if (-not $entry) { throw "PHP $minor not found in releases.json" }
          $path = $entry.'ts-vs16-x64'.zip.path
          if (-not $path) { $path = $entry.'ts-vs17-x64'.zip.path }
          if (-not $path) { throw "No TS x64 build for PHP $minor" }
          $url = "https://windows.php.net/downloads/releases/$path"
          Write-Host "Downloading PHP from $url"
          Invoke-WebRequest $url -OutFile php.zip
          $dest = "windows-installer/build/runtime/php"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive php.zip -DestinationPath $dest -Force
          if (-not (Test-Path "$dest/php8apache2_4.dll")) {
            throw "php8apache2_4.dll missing - not a Thread Safe build"
          }

      - name: Write php.ini with required extensions
        run: |
          $dir = "windows-installer/build/runtime/php"
          $ini = Get-Content -Raw "$dir/php.ini-production"
          $ini = $ini -replace '(?m)^;\s*(extension_dir\s*=\s*"ext")', '$1'
          foreach ($e in 'pdo_sqlite','sqlite3','mbstring','openssl','fileinfo','curl','zip','gd') {
            $ini = $ini -replace ('(?m)^;\s*extension\s*=\s*' + [regex]::Escape($e) + '\s*$'), ("extension=$e")
          }
          Set-Content -NoNewline "$dir/php.ini" $ini

      - name: Fetch portable Apache (2.4, VS17)
        run: |
          $url = "${{ github.event.inputs.apache_url }}"
          $headers = @{ "User-Agent" = "Mozilla/5.0"; "Referer" = "https://www.apachelounge.com/download/" }
          if (-not $url) {
            Write-Host "Auto-detecting latest Apache Lounge VS17 build..."
            $page = Invoke-WebRequest "https://www.apachelounge.com/download/" -UseBasicParsing -Headers $headers
            $m = [regex]::Match($page.Content, 'href="(/download/VS17/binaries/httpd-2\.4\.[\d]+-[\d]+-win64-VS17\.zip)"')
            if (-not $m.Success) { throw "Could not find an Apache VS17 zip link; pass apache_url manually." }
            $url = "https://www.apachelounge.com" + $m.Groups[1].Value
          }
          Write-Host "Downloading Apache from $url"
          Invoke-WebRequest $url -OutFile apache.zip -Headers $headers
          Expand-Archive apache.zip -DestinationPath apache_tmp -Force
          $dest = "windows-installer/build/runtime/apache"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Move-Item "apache_tmp/Apache24/*" $dest -Force
          if (-not (Test-Path "$dest/bin/httpd.exe")) { throw "httpd.exe missing after extract" }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "adms-installer.iss"
        working-directory: windows-installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADMS-Server-Setup
          path: windows-installer/Output/ADMS-Server-Setup.exe
          retention-days: 30

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: windows-installer/Output/ADMS-Server-Setup.exe
